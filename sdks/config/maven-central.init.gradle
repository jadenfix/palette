// Gradle init script that wires Maven Central (OSSRH) publishing + signing for
// the generated Kotlin client, applied at publish time via:
//
//   gradle --init-script sdks/config/maven-central.init.gradle publish
//
// It lives here (NOT inside sdks/clients/kotlin) on purpose: that client is
// wiped and regenerated by scripts/regen-sdks.sh, so any publish config baked
// into its build.gradle would be lost / would drift. The generated build only
// applies `maven-publish`, which by itself has no publication or repository —
// `gradle publish` would upload nothing. This script supplies both, plus the
// GPG signing Maven Central requires, from release secrets (see
// scripts/publish-sdk.sh, which only invokes it when those secrets are present).
allprojects {
    afterEvaluate { project ->
        if (!project.plugins.hasPlugin('maven-publish')) {
            project.apply plugin: 'maven-publish'
        }
        project.apply plugin: 'signing'

        // Maven Central requires sources + javadoc jars. The Kotlin JVM plugin
        // registers the `java` extension + `java` software component.
        if (project.extensions.findByName('java')) {
            project.extensions.getByName('java').with {
                withSourcesJar()
                withJavadocJar()
            }
        }

        project.publishing {
            publications {
                mavenJava(MavenPublication) {
                    def javaComponent = project.components.findByName('java')
                    if (javaComponent) {
                        from javaComponent
                    }
                    pom {
                        name = project.name
                        description = 'Generated control-plane client for the Beater API'
                        url = 'https://github.com/jadenfix/beater'
                        licenses {
                            license {
                                name = 'The Apache License, Version 2.0'
                                url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                            }
                        }
                        developers {
                            developer { id = 'beater'; name = 'Beater' }
                        }
                        scm {
                            url = 'https://github.com/jadenfix/beater'
                            connection = 'scm:git:https://github.com/jadenfix/beater.git'
                            developerConnection = 'scm:git:ssh://git@github.com/jadenfix/beater.git'
                        }
                    }
                }
            }
            repositories {
                maven {
                    name = 'OSSRH'
                    url = System.getenv('OSSRH_URL')
                        ?: 'https://s01.oss.sonatype.org/service/local/staging/deploy/maven2/'
                    credentials {
                        username = System.getenv('OSSRH_USERNAME')
                        password = System.getenv('OSSRH_PASSWORD')
                    }
                }
            }
        }

        def signingKey = System.getenv('SIGNING_KEY')
        def signingPassword = System.getenv('SIGNING_PASSWORD')
        if (signingKey) {
            project.signing {
                useInMemoryPgpKeys(signingKey, signingPassword)
                sign project.publishing.publications
            }
        }
    }
}
